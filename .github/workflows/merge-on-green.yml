# merge-on-green — the repo's own landing path for agent PRs.
#
# ============================== PROVENANCE ==============================
# Why added : Permanent fix for READY claude/* PRs landing "at random"
#             (owner directive, live coordinator chat 2026-07-12T23:00Z:
#             standing permission to merge all PRs + "fix the root
#             problem"). This repo CANNOT use GitHub-native auto-merge
#             (toggle unavailable on the private repo/plan), so the
#             sim-lab reference's arm-native shape is adapted to the
#             REST merge-on-green shape its own fallback note names for
#             exactly this repo class. Lives in its OWN workflow file
#             because substrate-gate.yml is KIT-OWNED (adopt/upgrade
#             overwrites hand edits).
# Reference : menno420/sim-lab .github/workflows/auto-merge-enabler.yml
#             @ 26cbb1de65e654aac46b3667ea16806f4364e107 (repo ref
#             f4d3e02) — guard shapes carried over: never-gate-on-nothing
#             (here: a non-empty REQUIRED_FLOOR unioned with the rules
#             API), fresh label re-read (stale-payload race),
#             injection-safe argv/env passing (never interpolate
#             PR-controlled strings into shell), Head-ref: squash
#             provenance.
# Date      : 2026-07-12 (build worker, model: fable-5; fleet-manager
#             PR #146)
# Reliability: unverified — confirm its merges against ground truth a few
#             times across sessions before trusting it.
# Kill-switch: delete this if it proves unreliable over multiple sessions.
# ========================================================================
#
# WHAT IT DOES: on every check completion / PR readiness change, sweep
# ALL open, READY (non-draft), same-repo PRs with head `claude/*` and
# base `main`; for each, verify EVERY required check context on the
# head SHA is completed+success (pending/queued = NOT ready); then
# squash-merge with GITHUB_TOKEN. No agent merge call anywhere.
#
# WHY NOTHING CAN LAND EARLY: the required `substrate-gate` check is
# born-red by design — it stays red until the PR's in-diff session card
# flips to `complete` — so this workflow structurally cannot merge a
# half-done session. The card flip IS the arm.
#
# CARVE-OUTS (ratification park — skipped, never merged/closed/rebased):
# labels `do-not-automerge` and `owner-held`, re-read FRESH from the API
# per PR (the sim-lab stale-payload label-race guard: event payloads
# snapshot labels; an MCP-created PR gets its label in a second call).
#
# RACE GUARD: the merge call pins `--match-head-commit <verified SHA>`,
# so a push racing the sweep can never land an unverified head.
#
# KNOWN LIMIT (accepted): merges performed with GITHUB_TOKEN do not
# trigger other `push`-event workflows on main (GitHub's recursion
# guard). substrate-gate's push-on-main run is verification-only, and
# roster-regen is not push-triggered, so nothing load-bearing is lost.
name: merge-on-green
on:
  check_suite:
    types: [completed]
  pull_request:
    types: [ready_for_review, synchronize, labeled, unlabeled]
  workflow_run:
    workflows: [substrate-gate, roster-freshness]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
  checks: read
concurrency:
  # One sweep at a time, repo-wide; queued (never cancelled) so a merge
  # in flight is never killed halfway and a completion event arriving
  # mid-sweep still gets its own follow-up pass.
  group: merge-on-green
  cancel-in-progress: false
jobs:
  merge-on-green:
    runs-on: ubuntu-latest
    steps:
      - name: Sweep open claude/* PRs and squash-merge the fully-green ones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys

          repo = os.environ["GITHUB_REPOSITORY"]
          PARK_LABELS = {"do-not-automerge", "owner-held"}
          # The repo's required-check FLOOR. LIVE-VERIFIED (PR #146, run
          # 29214147939): the rules API below returned ZERO contexts on
          # main — this repo's checks are not enforced via a ruleset
          # visible to GITHUB_TOKEN (classic branch protection is not
          # surfaced by rules/branches/*, and .../protection needs admin).
          # The floor is unioned with whatever the API reports, so the
          # gate can never be empty (no gate inversion) and never ignores
          # a ruleset-added check. Update this set if the repo's required
          # checks change.
          REQUIRED_FLOOR = {"substrate-gate", "freshness"}

          def gh(*args, ok_fail=False):
              # argv-only (never a shell string): PR-controlled values
              # (branch names, titles) ride as arguments but can never
              # splice into a command (sim-lab PR #64 precedent).
              r = subprocess.run(["gh", *args], capture_output=True, text=True)
              if r.returncode != 0 and not ok_fail:
                  print(r.stderr, file=sys.stderr)
                  sys.exit(1)  # fail LOUD: an unreadable API must not merge
              return r.returncode, r.stdout, r.stderr

          # 1. Required check CONTEXTS on main = ruleset-reported contexts
          #    UNION the hardcoded floor. The sim-lab refuse-to-arm guard's
          #    intent (never gate on nothing) is preserved by the non-empty
          #    floor; the union means a future ruleset-added check is
          #    honored automatically.
          _, out, _ = gh("api", f"repos/{repo}/rules/branches/main",
                         "--jq", '[.[] | select(.type == "required_status_checks")'
                                 ' | .parameters.required_status_checks // [] | .[].context]')
          from_rules = set(json.loads(out or "[]"))
          if not from_rules:
              print("note: rules API reports zero required contexts on main "
                    "(expected on this repo — see REQUIRED_FLOOR comment); "
                    "gating on the floor.")
          required = sorted(from_rules | REQUIRED_FLOOR)
          print(f"required contexts ({len(required)}): {required}")

          # 2. All open PRs, filtered to the landing lane.
          _, out, _ = gh("api", f"repos/{repo}/pulls?state=open&per_page=100",
                         "--paginate", "--jq", ".[] | @json")
          def parse_line(line):
              v = json.loads(line)
              return json.loads(v) if isinstance(v, str) else v
          prs = [parse_line(l) for l in out.splitlines() if l]

          merged, skipped = [], []
          for pr in prs:
              n = pr["number"]
              head_ref = pr["head"]["ref"]
              head_sha = pr["head"]["sha"]
              if pr.get("draft"):
                  skipped.append((n, "draft")); continue
              if pr["base"]["ref"] != "main":
                  skipped.append((n, "base != main")); continue
              if (pr["head"]["repo"] or {}).get("full_name") != repo:
                  skipped.append((n, "fork head")); continue
              if not head_ref.startswith("claude/"):
                  skipped.append((n, f"head {head_ref!r} not claude/*")); continue

              # 3. Labels re-read FRESH (never trust the event payload).
              _, out, _ = gh("api", f"repos/{repo}/issues/{n}/labels",
                             "--jq", "[.[].name]")
              labels = set(json.loads(out or "[]"))
              park = labels & PARK_LABELS
              if park:
                  skipped.append((n, f"ratification park: {sorted(park)}")); continue

              # 4. EVERY required context on the head SHA must be
              #    completed+success. Check runs first (filter=latest);
              #    legacy commit statuses as fallback for contexts not
              #    reported as check runs. Pending/queued/missing = NOT ready.
              _, out, _ = gh("api",
                             f"repos/{repo}/commits/{head_sha}/check-runs"
                             "?filter=latest&per_page=100", "--paginate",
                             "--jq", '[.check_runs[] | {name, status, conclusion}]')
              runs = {}
              for page in out.splitlines():
                  for cr in json.loads(page or "[]"):
                      runs[cr["name"]] = cr
              statuses = None  # fetched lazily only if a context needs it
              not_ready = []
              for ctx in required:
                  cr = runs.get(ctx)
                  if cr is not None:
                      if cr["status"] != "completed" or cr["conclusion"] != "success":
                          not_ready.append(f"{ctx}: {cr['status']}/{cr['conclusion']}")
                      continue
                  if statuses is None:
                      _, sout, _ = gh("api",
                                      f"repos/{repo}/commits/{head_sha}/status",
                                      "--jq", '[.statuses[] | {context, state}]')
                      statuses = {s["context"]: s["state"]
                                  for s in json.loads(sout or "[]")}
                  if statuses.get(ctx) != "success":
                      not_ready.append(f"{ctx}: {statuses.get(ctx, 'MISSING')}")
              if not_ready:
                  skipped.append((n, "; ".join(not_ready))); continue

              # 5. Squash-merge, pinned to the SHA just verified so a race
              #    push can never land unverified. Head-ref provenance in
              #    the squash body (sim-lab host customization: squash-only
              #    history otherwise starves branch surveys). A failed
              #    merge (conflict, base moved) is a warning, not a crash —
              #    the next completion event re-sweeps.
              rc, mout, merr = gh("pr", "merge", str(n), "--repo", repo,
                                  "--squash", "--match-head-commit", head_sha,
                                  "--body", f"Head-ref: {head_ref}",
                                  ok_fail=True)
              if rc == 0:
                  print(f"MERGED PR #{n} ({head_ref} @ {head_sha[:12]})")
                  merged.append(n)
              else:
                  print(f"::warning::merge failed for PR #{n}: {merr.strip()}")
                  skipped.append((n, "merge call failed (see warning)"))

          for n, why in skipped:
              print(f"skipped PR #{n}: {why}")
          print(f"sweep done — merged: {merged or 'none'}")
          PY
