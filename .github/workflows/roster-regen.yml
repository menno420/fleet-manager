# roster-regen — automated docs/roster.md regeneration on a timely trigger.
#
# ============================== PROVENANCE ==============================
# Why added : P1 (FRESHNESS) of the fleet centralization plan (superbot
#             docs/planning/fleet-centralization-plan-2026-07-11.md §3a):
#             regen must NOT depend on the manager agent waking — the only
#             prior regen path was an agent wake + a hand-exported triggers
#             JSON, and the roster went ~13h stale when the seat parked.
#             Motivating incident: roster gen #6 (2026-07-11) found NINE
#             lane failsafes auto-disabled (ended_reason=
#             auto_disabled_env_deleted, 14:45-16:16Z); that silent-dark
#             class hides behind exactly this staleness.
# Date      : 2026-07-11 (lane worker, model: fable-5, dispatched by
#             coordinator cse_012o8pySy5K3AV6JWoPKryZL; fleet-manager PR #81)
# Reliability: unverified — confirm its output against ground truth a few
#             times across sessions before trusting it (watch the first
#             scheduled runs; verify the pushed roster's cells like a
#             gen_roster verification run).
# Kill-switch: delete this if it proves unreliable over multiple sessions.
# ========================================================================
#
# WHAT gen_roster.py NEEDS HERE (verified against its source, 2026-07-11):
#   (1) the committed telemetry/triggers-snapshot.json (list_triggers is
#       MCP-only, so the snapshot dump is inherently a CCR manager-wake
#       step; this workflow only CONSUMES the committed snapshot);
#   (2) the `git` binary + plain https to github.com — it reads each lane
#       heartbeat via `git ls-remote` + shallow `git fetch` in a temp dir.
#       Actions runners have normal direct internet: the agent-session
#       git-proxy stale-pack caveat does NOT apply here, so the script's
#       re-fetch-until-converged loop trivially passes on attempt 1;
#   (3) python3 stdlib only. NOTE: private lane repos (pokemon-mod-lab)
#       are unreadable to an unauthenticated fetch and GITHUB_TOKEN is
#       scoped to THIS repo only. The regen step forwards the
#       ROSTER_READ_TOKEN secret (fine-grained read-only PAT — owner
#       click; candidate in the dispatching worker report / owner queue)
#       so gen_roster authenticates those reads; until the secret exists
#       the row degrades honestly to "NOT MEASURED (wall: ...)" with
#       verdict UNREADABLE (transport/auth) — a measurement artifact,
#       never printed as lane death (gen #21 lesson: pokemon-mod-lab
#       showed DEAD while ARCHIVE-READY with kit v1.15.0 freshly merged).
#
# COMMIT PATH (v2 — live-corrected same day, PR #81 follow-up): bot branch
#   -> PR -> immediate squash-merge via `gh`. The v1 direct-push path was
#   live-tested (run 29164975251, 2026-07-11T19:17Z) and REJECTED by a
#   repository ruleset — verbatim:
#     remote: error: GH013: Repository rule violations found for refs/heads/main.
#     remote: - Changes must be made through a pull request.
#     ! [remote rejected] HEAD -> main (push declined due to repository rule violations)
#   (The regen itself worked: gen #7 was committed on the runner; only the
#   push was declined.) So: push to the FIXED branch bot/roster-regen
#   (force — one branch, one open PR max), create-or-reuse its PR, and
#   squash-merge it in the same run. GITHUB_TOKEN-created PRs never trigger
#   workflows (recursion guard), so no checks run on the bot PR — the merge
#   succeeds iff the ruleset requires only "changes through a PR" (no
#   required-check/review rule binds a check that never reports... unless it
#   does: if the merge is DENIED, the run goes RED and the PR PARKS OPEN on
#   bot/roster-regen for the next manager wake to land — one PR, not an
#   accumulating pile). Either terminal state is loud; and
#   check_roster_freshness.py reds manager PRs ~4h later (double alarm).
#   v3 ADDENDUM (second live wall, run 29165152964, 2026-07-11T19:23Z):
#   PR creation by GITHUB_TOKEN is ALSO blocked until the owner ticks
#   "Allow GitHub Actions to create and approve pull requests" — verbatim:
#     pull request create failed: GraphQL: GitHub Actions is not permitted
#     to create or approve pull requests (createPullRequest)
#   The regen + branch push WORKED (gen #7 commit a310a12 reached
#   bot/roster-regen); only the PR-create permission is missing. The owner
#   click is docs/owner-queue.md id OQ-FM-ACTIONS-PR-PERMISSION (P2 slug;
#   was "item 33" pre-slug-migration). Until it lands, this workflow
#   degrades honestly: it pushes the regen to bot/roster-regen, reuses an
#   already-open PR when one exists, and otherwise reds with a pointer —
#   the manager wake (or the owner click) completes the landing.
#
# CCR-TRIGGER ALTERNATIVE (recorded fallback, per the plan): if Actions
#   cron proves unreliable, arm a dedicated CCR routine instead —
#   create_trigger(name="fleet roster regen", cron_expression="40 */2 * * *",
#   create_new_session_on_fire=true, prompt="Sync menno420/fleet-manager to
#   origin/main. Export list_triggers fully (paginate) to
#   telemetry/triggers-snapshot.json (stable-sort by id), run
#   python3 scripts/gen_roster.py --triggers telemetry/triggers-snapshot.json,
#   verify with scripts/check_roster_freshness.py, land both as a
#   merged-on-green PR."). That path ALSO refreshes the snapshot (it has
#   MCP), at the cost of agent-session walls this workflow avoids.
#
# Cadence: every 2h at minute 40 — offset from the lane heartbeat crons
# (lanes wake at :00/:15/:20/:30/:45/:50 on even hours; the manager
# failsafe is 30 */2) so this reads settled heartbeats and never races
# the manager's own wake writes.
name: roster-regen
on:
  schedule:
    - cron: "40 */2 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: roster-regen
  cancel-in-progress: false
jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - name: snapshot-age advisory (the snapshot is only as fresh as the last manager wake)
        # The committed snapshot is refreshed by CCR manager wakes, not by
        # this workflow (list_triggers is MCP-only). A stale snapshot means
        # the roster's TRIGGER columns lag reality even though heartbeat
        # columns are fresh — warn loudly, but still regenerate (fresh
        # heartbeats + stale triggers beats an entirely frozen roster).
        run: |
          snap_ts="$(git log -1 --format=%ct -- telemetry/triggers-snapshot.json || echo 0)"
          if [ "$snap_ts" = "0" ] || [ -z "$snap_ts" ]; then
            echo "::error::telemetry/triggers-snapshot.json missing from git history — regen cannot run headless"
            exit 1
          fi
          age_h=$(( ( $(date +%s) - snap_ts ) / 3600 ))
          echo "snapshot age: ${age_h}h (committed $(git log -1 --format=%cI -- telemetry/triggers-snapshot.json))"
          if [ "$age_h" -gt 24 ]; then
            echo "::warning::triggers snapshot is ${age_h}h old (>24h) — roster trigger columns lag reality; the manager wake owes a fresh list_triggers dump"
          fi
      - name: regenerate docs/roster.md + docs/owner-queue-candidates.md + docs/evidence-index.md + registry/lanes.json from the committed snapshot + live heartbeats
        env:
          # Fine-grained read-only PAT for PRIVATE lane repos
          # (pokemon-mod-lab). Renders EMPTY until the owner creates the
          # secret — gen_roster treats blank as unset and the private row
          # degrades honestly to UNREADABLE (transport/auth), never DEAD.
          ROSTER_READ_TOKEN: ${{ secrets.ROSTER_READ_TOKEN }}
        run: |
          python3 scripts/gen_roster.py \
            --triggers telemetry/triggers-snapshot.json \
            --generated-by "roster-regen workflow (GitHub Actions, headless)" \
            --dispatched-by "cron 40 */2 * * * (.github/workflows/roster-regen.yml, fleet-manager PR #81)"
      - name: freshness self-check (blocking)
        run: python3 scripts/check_roster_freshness.py
      - name: owner-queue merged-PR probe (P2 — REPORT-ONLY, never merge-blocking)
        # check_owner_queue.py flags queue items whose cited PRs already
        # merged/closed (the "already-satisfied ask" drift class; plan §3b).
        # --advisory: flags surface as ::warning:: annotations on the run,
        # exit 0 always — a stale queue item alerts the manager wake, it
        # never jams the roster landing. GITHUB_TOKEN gives the API path;
        # cross-repo public PR reads work with the repo-scoped token.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/check_owner_queue.py --advisory
      - name: commit + land via PR (ruleset requires PRs on main — GH013, run 29164975251)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- docs/roster.md docs/owner-queue-candidates.md docs/evidence-index.md registry/lanes.json; then
            echo "roster + candidate feed + evidence index + lane registry unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "roster-regen[workflow]"
          git config user.email "actions@github.com"
          gen="$(grep -om1 'Generation #[0-9]*' docs/roster.md || echo 'Generation #?')"
          git checkout -B bot/roster-regen
          git add docs/roster.md docs/owner-queue-candidates.md docs/evidence-index.md registry/lanes.json
          git commit -m "Roster regen (automated, ${gen}) [roster-regen.yml]"
          git push -f origin bot/roster-regen
          pr="$(gh pr list --head bot/roster-regen --state open --json number --jq '.[0].number' || true)"
          if [ -z "$pr" ]; then
            if ! gh pr create --head bot/roster-regen --base main \
              --title "Roster regen (automated, ${gen})" \
              --body "Automated roster + owner-queue-candidate-feed + evidence-index + lane-registry regeneration from the committed triggers snapshot + live heartbeats (.github/workflows/roster-regen.yml). Generated docs only — docs/roster.md + docs/owner-queue-candidates.md + docs/evidence-index.md + registry/lanes.json."; then
              echo "::error::PR creation DENIED (GITHUB_TOKEN cannot create PRs until the owner ticks 'Allow GitHub Actions to create and approve pull requests' — docs/owner-queue.md id OQ-FM-ACTIONS-PR-PERMISSION). The regen commit IS pushed on bot/roster-regen; the next manager wake (or the owner) opens+lands it."
              exit 1
            fi
            pr="$(gh pr list --head bot/roster-regen --state open --json number --jq '.[0].number')"
          fi
          echo "landing roster regen via PR #$pr"
          if ! gh pr merge "$pr" --squash --delete-branch; then
            sleep 10
            gh pr merge "$pr" --squash --delete-branch || {
              echo "::error::squash-merge of PR #$pr DENIED — the regen PR is PARKED OPEN on bot/roster-regen for the next manager wake to land (roster is going stale until then)"
              exit 1
            }
          fi
